{% extends 'base.html' %}
{% block content %}
<section class="panel narrow">
    <h1>冲扫信息：{{ roll.title }}</h1>
    <form method="post" class="form-grid">
        <label>冲扫店铺<input name="lab_name" value="{{ scan.lab_name if scan else '' }}" placeholder="XXX LAB"></label>
        <label>冲扫工艺<input name="process_type" value="{{ scan.process_type if scan else '' }}" placeholder="C-41 / ECN-2 / E-6 / 黑白"></label>
        <label>减/迫冲<input name="push_pull" value="{{ scan.push_pull if scan else '' }}" placeholder="正常 / 迫冲 +1 / 减冲 -1"></label>
        <label>扫描仪型号<input name="scanner_model" value="{{ scan.scanner_model if scan else '' }}" placeholder="Noritsu / Fuji SP3000"></label>
        <label>文件格式<input name="file_format" value="{{ scan.file_format if scan else '' }}" placeholder="JPG / TIFF"></label>
        <label>出片日期<input type="date" name="scan_date" value="{{ scan.scan_date if scan else '' }}"></label>
        <label class="full">冲扫评价<textarea name="comment" rows="4">{{ scan.comment if scan else '' }}</textarea></label>
        <div class="form-actions full">
            <button class="btn primary" type="submit">保存冲扫信息</button>
            <a class="btn light" href="{{ url_for('roll_detail', roll_id=roll.id) }}">返回</a>
        </div>
    </form>
</section>
{% endblock %}
